name: eduvest_output
description: EduVest - Student Personal Finance App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.4
  firebase_messaging: ^15.0.4

  # Data & serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5

  # Local storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # UI & charts
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # Utils
  dartz: ^0.10.1
  get_it: ^8.0.0
  injectable: ^2.4.4
  connectivity_plus: ^6.0.3
  local_auth: ^2.3.0
  flutter_windowmanager: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.6.2
  mockito: ^5.4.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  mock_exceptions: ^0.8.2

flutter:
  uses-material-design: true
